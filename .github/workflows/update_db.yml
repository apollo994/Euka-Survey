name: Monthly Database Build

on:
  schedule:
    - cron: '0 0 1 * *' # 00:00 on the 1st of every month
  workflow_dispatch:    # Also runnable manually from the Actions tab

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required so the workflow can publish a Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ncbi-datasets-cli
        # Standalone binary from NCBI — much faster than `conda install`
        # and we use only the `datasets summary genome taxon` subcommand.
        run: |
          curl -sSL -o /usr/local/bin/datasets \
            https://ftp.ncbi.nlm.nih.gov/pub/datasets/command-line/v2/linux-amd64/datasets
          chmod +x /usr/local/bin/datasets
          datasets --version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python dependencies
        # `--extra pipeline` pulls in tenacity (and any future pipeline-only
        # deps); the dev group is not needed for the build.
        run: uv sync --extra pipeline --no-default-groups

      - name: Build Database Pipeline
        # Pipeline now bakes precompute_taxa internally and writes
        # atomically to *.db.partial → *.db on success (Phase 2 Batch 5).
        run: |
          uv run python db_builder/pipeline_build_db.py

          # The pipeline drops a dated file like eukaryote_taxid_features_YYYY_MM_DD.db.
          # Require exactly one match to catch leftover artifacts from a prior failed run.
          shopt -s nullglob
          built=( eukaryote_taxid_features_*.db )
          if [ ${#built[@]} -ne 1 ]; then
            echo "Expected exactly one eukaryote_taxid_features_*.db, found ${#built[@]}: ${built[*]}" >&2
            exit 1
          fi
          mv "${built[0]}" eukaryotes.db

      - name: Smoke-test produced DB
        run: |
          uv run python - <<'PY'
          import os, sqlite3, sys
          db = "eukaryotes.db"
          size_bytes = os.path.getsize(db)
          MIN_BYTES = 50 * 1024 * 1024   # full DB is ~300 MB
          if size_bytes < MIN_BYTES:
              print(f"FAIL: {db} is only {size_bytes} bytes (< {MIN_BYTES})", file=sys.stderr)
              sys.exit(1)

          expected = {
              "taxid_features": 100_000,
              "precomputed_clade_features": 10_000,
              "precomputed_taxa": 100,
          }
          conn = sqlite3.connect(f"file:{db}?mode=ro", uri=True)
          try:
              for table, min_rows in expected.items():
                  (n,) = conn.execute(f"SELECT COUNT(*) FROM {table}").fetchone()
                  print(f"{table}: {n} rows")
                  if n < min_rows:
                      print(f"FAIL: {table} has only {n} rows (< {min_rows})", file=sys.stderr)
                      sys.exit(1)
          finally:
              conn.close()
          print("Smoke test passed.")
          PY

      - name: Compute release tag
        run: |
          # Date + hour/minute so manual reruns on the same day don't collide.
          # `date -u` keeps the workflow's clock consistent across runners.
          BUILD_DATE=$(date -u +%Y.%m.%d.%H%M)
          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_ENV"

      - name: Publish to GitHub Release
        # tag_name is date-based so past releases stay around for rollback;
        # make_latest: true keeps the app's /releases/latest/download/ URL
        # pointing at this build. The previous `tag_name: latest` was
        # overwrite-only and offered no rollback path.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "db-${{ env.BUILD_DATE }}"
          name: "Database build ${{ env.BUILD_DATE }}"
          body: |
            Automated monthly database build on ${{ env.BUILD_DATE }} UTC.

            Sources: NCBI (assemblies), Annotrieve (annotations),
            ENA (RNA-Seq runs split by platform).
          files: eukaryotes.db
          make_latest: true
