name: Monthly Database Build

on:
  schedule:
    - cron: '0 0 1 * *' # Runs at 00:00 on the 1st of every month automatically
  workflow_dispatch: # Allows you to manually trigger it by clicking a button in the Actions tab

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to allow the workflow to create a Release

    defaults:
      run:
        shell: bash -el {0} # Required for conda activates to work

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: euka_refactored
          environment-file: environment.yml
          auto-activate-base: false
          miniconda-version: "latest"

      - name: Build Database Pipeline
        run: |
          # The pipeline now does all 7 steps including precompute_taxa,
          # and writes atomically to *.db.partial → *.db on success.
          python db_builder/pipeline_build_db.py

          # The pipeline drops a dated file like eukaryote_taxid_features_2026_05_11.db
          # Require exactly one match to catch leftover artifacts from a prior failed run.
          shopt -s nullglob
          built=( eukaryote_taxid_features_*.db )
          if [ ${#built[@]} -ne 1 ]; then
            echo "Expected exactly one eukaryote_taxid_features_*.db, found ${#built[@]}: ${built[*]}" >&2
            exit 1
          fi
          mv "${built[0]}" eukaryotes.db

      - name: Smoke-test produced DB
        run: |
          python - <<'PY'
          import os
          import sqlite3
          import sys

          db = "eukaryotes.db"
          size_bytes = os.path.getsize(db)
          # The full DB is ~300 MB; anything under 50 MB suggests a truncated build.
          MIN_BYTES = 50 * 1024 * 1024
          if size_bytes < MIN_BYTES:
              print(f"FAIL: {db} is only {size_bytes} bytes (< {MIN_BYTES})", file=sys.stderr)
              sys.exit(1)

          expected = {
              "taxid_features": 100_000,
              "precomputed_clade_features": 10_000,
              "precomputed_taxa": 100,
          }
          conn = sqlite3.connect(f"file:{db}?mode=ro", uri=True)
          try:
              for table, min_rows in expected.items():
                  (n,) = conn.execute(f"SELECT COUNT(*) FROM {table}").fetchone()
                  print(f"{table}: {n} rows")
                  if n < min_rows:
                      print(f"FAIL: {table} has only {n} rows (< {min_rows})", file=sys.stderr)
                      sys.exit(1)
          finally:
              conn.close()
          print("Smoke test passed.")
          PY

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Database Update"
          body: "Automated database build."
          files: eukaryotes.db
          make_latest: true
