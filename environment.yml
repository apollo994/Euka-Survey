name: euka_refactored
channels:
  - conda-forge
dependencies:
  - python=3.11
  - ncbi-datasets-cli
  - pyqt==5.15.11
  - pip
  - pip:
      - pyvirtualdisplay
      - ete3==3.1.3
      # numpy pinned <2.0 for ete3/matplotlib ABI compatibility
      - numpy<2.0.0
      - matplotlib
      - requests
      - tenacity
      - streamlit
      # Dev-only — tests/ uses pytest. Installed everywhere so a fresh env
      # supports `pytest` without an extra step.
      - pytest
