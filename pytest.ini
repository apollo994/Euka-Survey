[pytest]
# Tests live under tests/ and import src.* / db_builder.*.
# We add the project root to sys.path so those package imports work without
# a pyproject.toml / installed package (which is on the Phase 3 roadmap).
testpaths = tests
addopts = -ra --strict-markers
markers =
    network: hits external services (ENA, NCBI). Skipped by default; run with `-m network` to enable.
    slow: takes more than a couple of seconds. Skipped by default; run with `-m slow` to enable.
    requires_ete3_db: requires the local ETE3 NCBI taxonomy SQLite (~/.etetoolkit/taxa.sqlite).
